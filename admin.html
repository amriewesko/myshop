<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin ระบบจัดการสินค้า</title>
<style>
  body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #f8f9fa;
    margin: 0; padding: 20px;
  }
  .container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgb(0 0 0 / 0.1);
  }
  h2, h3 {
    text-align: center;
    color: #333;
  }
  input[type=text], input[type=password], input[type=url], input[type=file] {
    width: 100%;
    padding: 10px 15px;
    margin: 8px 0 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
    font-size: 16px;
  }
  button {
    cursor: pointer;
    background-color: #007bff;
    border: none;
    color: white;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 16px;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background-color: #0056b3;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
  }
  th {
    background-color: #007bff;
    color: white;
  }
  img {
    max-width: 80px;
    border-radius: 6px;
  }
  .btn-edit {
    background-color: #ffc107;
    color: black;
    margin-right: 8px;
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
  }
  .btn-edit:hover {
    background-color: #e0a800;
  }
  .btn-delete {
    background-color: #dc3545;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
  }
  .btn-delete:hover {
    background-color: #b02a37;
  }
  .link-back {
    text-align: center;
    margin-bottom: 20px;
  }
  .link-back a {
    color: #007bff;
    text-decoration: none;
    font-weight: 600;
  }
  .link-back a:hover {
    text-decoration: underline;
  }
  #preview {
    max-width: 120px;
    border-radius: 6px;
    margin-bottom: 15px;
    display: none;
  }
  #message {
    margin: 15px 0;
    text-align: center;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="container">
  <h2>ระบบแอดมินจัดการสินค้า</h2>

  <!-- ปุ่มย้อนกลับไปดูหน้าเว็บหลัก -->
  <div class="link-back" id="link-back" style="display:none;">
    <a href="index.html">🔙 กลับไปดูสินค้าทั้งหมด</a>
  </div>

  <!-- เริ่มต้นแสดงปุ่มเข้าสู่ระบบ -->
  <div id="start-section">
    <button onclick="showLogin()">➡ เข้าสู่ระบบแอดมิน</button>
  </div>

  <!-- ฟอร์มล็อกอิน -->
  <div id="login-section" style="display:none;">
    <input type="password" id="password" placeholder="กรอกรหัสผ่านแอดมิน" />
    <button onclick="login()">เข้าสู่ระบบ</button>
  </div>

  <!-- ปุ่มเพิ่มสินค้า -->
  <div id="add-product-btn" style="display:none; margin-top:20px;">
    <button onclick="showForm()">➕ เพิ่มสินค้าใหม่</button>
  </div>

  <!-- ฟอร์มเพิ่ม/แก้ไขสินค้า -->
  <div id="form-section" style="display:none; margin-top:20px;">
    <h3 id="form-title">เพิ่มสินค้าใหม่</h3>
    <input type="hidden" id="edit-index" value="" />
    <label>ชื่อสินค้า</label>
    <input type="text" id="product-name" placeholder="ชื่อสินค้า" />
    <label>เลือกรูปภาพ</label>
    <input type="file" id="imageInput" accept="image/*" onchange="uploadImage()" />
    <img id="preview" alt="Preview" />
    <input type="hidden" id="product-img-url" />
    <label>ลิงก์สินค้า</label>
    <input type="url" id="product-link" placeholder="URL ของสินค้า" />
    <button onclick="submitProduct()">บันทึกข้อมูล</button>
    <button style="background:#6c757d; margin-top:10px;" onclick="cancelForm()">ยกเลิก</button>
  </div>

  <!-- แสดงข้อความสถานะ -->
  <div id="message"></div>

  <!-- ตารางรายการสินค้า -->
  <div id="products-section" style="display:none;">
    <h3>รายการสินค้า</h3>
    <table>
      <thead>
        <tr>
          <th>ชื่อสินค้า</th>
          <th>รูปภาพ</th>
          <th>ลิงก์</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="products-table-body"></tbody>
    </table>
  </div>
</div>

<script>
  // ====== CONFIG ======
  const SHEET_URL = "https://api.sheetbest.com/sheets/5964ef7f-5879-4b06-8a97-ecf46634f9be"; // เปลี่ยนเป็น API URL ของคุณ
  const IMGBB_API_KEY = "1838933755ecde270eabbf6d57977b80"; // ใส่ API KEY ของ imgbb

  // ====== ตัวแปร ======
  let products = [];

  // ====== แสดงฟอร์มล็อกอิน ======
  function showLogin() {
    document.getElementById("start-section").style.display = "none";
    document.getElementById("login-section").style.display = "block";
    document.getElementById("link-back").style.display = "block";
  }

  // ====== ฟังก์ชันล็อกอินง่ายๆ ======
  function login() {
    const pw = document.getElementById("password").value;
    if (pw === "admin123") {
      setMessage("เข้าสู่ระบบสำเร็จ", "green");
      document.getElementById("login-section").style.display = "none";
      document.getElementById("add-product-btn").style.display = "block";
      document.getElementById("products-section").style.display = "block";
      loadProducts();
    } else {
      setMessage("รหัสผ่านไม่ถูกต้อง", "red");
    }
  }

  // ====== โหลดข้อมูลสินค้าจาก Google Sheets ======
  function loadProducts() {
    fetch(SHEET_URL)
      .then(res => res.json())
      .then(data => {
        products = data;
        renderProductsTable();
      })
      .catch(err => {
        setMessage("โหลดข้อมูลล้มเหลว โปรดลองใหม่อีกครั้ง", "red");
        console.error(err);
      });
  }

  // ====== แสดงตารางสินค้า ======
  function renderProductsTable() {
    const tbody = document.getElementById("products-table-body");
    tbody.innerHTML = "";
    products.forEach((item, index) => {
      tbody.innerHTML += `
        <tr>
          <td>${item["ชื่อสินค้า"] || ""}</td>
          <td><img src="${item["รูปภาพ"] || ""}" alt="รูปสินค้า" /></td>
          <td><a href="${item["ลิงก์"] || "#"}" target="_blank">ลิงก์สินค้า</a></td>
          <td>
            <button class="btn-edit" onclick="editProduct(${index})">แก้ไข</button>
            <button class="btn-delete" onclick="deleteProduct(${index})">ลบ</button>
          </td>
        </tr>
      `;
    });
  }

  // ====== แสดงฟอร์มเพิ่มสินค้า ======
  function showForm() {
    clearForm();
    document.getElementById("form-title").innerText = "เพิ่มสินค้าใหม่";
    document.getElementById("form-section").style.display = "block";
    document.getElementById("add-product-btn").style.display = "none";
    document.getElementById("products-section").style.display = "none";
    setMessage("");
  }

  // ====== อัปโหลดรูปไป imgbb ======
  function uploadImage() {
    const file = document.getElementById("imageInput").files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("image", file);

    setMessage("กำลังอัปโหลดรูป...", "black");

    fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
      method: "POST",
      body: formData
    })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          document.getElementById("product-img-url").value = data.data.url;
          const preview = document.getElementById("preview");
          preview.src = data.data.url;
          preview.style.display = "block";
          setMessage("อัปโหลดรูปสำเร็จ", "green");
        } else {
          setMessage("อัปโหลดรูปไม่สำเร็จ", "red");
        }
      })
      .catch(() => setMessage("เกิดข้อผิดพลาดในการอัปโหลดรูป", "red"));
  }

  // ====== บันทึกข้อมูลสินค้า (เพิ่มหรือแก้ไข) ======
  function submitProduct() {
    const index = document.getElementById("edit-index").value;
    const name = document.getElementById("product-name").value.trim();
    const img = document.getElementById("product-img-url").value.trim();
    const link = document.getElementById("product-link").value.trim();

    if (!name || !img || !link) {
      alert("กรุณากรอกข้อมูลให้ครบทุกช่อง");
      return;
    }

    if (index === "") {
      // เพิ่มสินค้าใหม่ (POST)
      fetch(SHEET_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          "ชื่อสินค้า": name,
          "รูปภาพ": img,
          "ลิงก์": link
        })
      })
        .then(() => {
          setMessage("เพิ่มสินค้าเรียบร้อย", "green");
          cancelForm();
          loadProducts();
        })
        .catch(() => setMessage("เพิ่มสินค้าไม่สำเร็จ", "red"));
    } else {
      // แก้ไขสินค้า (PATCH)
      const item = products[index];
      if (!item || !item.id) {
        alert("ไม่พบข้อมูลสินค้าเพื่อแก้ไข");
        return;
      }
      const patchURL = `${SHEET_URL}/${item.id}`;
      fetch(patchURL, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          "ชื่อสินค้า": name,
          "รูปภาพ": img,
          "ลิงก์": link
        })
      })
        .then(() => {
          setMessage("แก้ไขสินค้าเรียบร้อย", "green");
          cancelForm();
          loadProducts();
        })
        .catch(() => setMessage("แก้ไขสินค้าไม่สำเร็จ", "red"));
    }
  }

  // ====== แก้ไขข้อมูลสินค้า ======
  function editProduct(index) {
    const item = products[index];
    if (!item) return;
    document.getElementById("edit-index").value = index;
    document.getElementById("product-name").value = item["ชื่อสินค้า"] || "";
    document.getElementById("product-img-url").value = item["รูปภาพ"] || "";
    const preview = document.getElementById("preview");
    preview.src = item["รูปภาพ"] || "";
    preview.style.display = item["รูปภาพ"] ? "block" : "none";
    document.getElementById("product-link").value = item["ลิงก์"] || "";

    document.getElementById("form-title").innerText = "แก้ไขสินค้า";
    document.getElementById("form-section").style.display = "block";
    document.getElementById("add-product-btn").style.display = "none";
    document.getElementById("products-section").style.display = "none";
    setMessage("");
  }

  // ====== ลบสินค้า ======
  function deleteProduct(index) {
    if (!confirm("คุณแน่ใจจะลบสินค้านี้หรือไม่?")) return;
    const item = products[index];
    if (!item || !item.id) {
      alert("ไม่พบข้อมูลสินค้าเพื่อจะลบ");
      return;
    }
    const delURL = `${SHEET_URL}/${item.id}`;
    fetch(delURL, { method: "DELETE" })
      .then(() => {
        setMessage("ลบสินค้าเรียบร้อย", "green");
        loadProducts();
      })
      .catch(() => setMessage("ลบสินค้าไม่สำเร็จ", "red"));
  }

  // ====== ยกเลิกฟอร์ม ======
  function cancelForm() {
    document.getElementById("form-section").style.display = "none";
    document.getElementById("add-product-btn").style.display = "block";
    document.getElementById("products-section").style.display = "block";
    clearForm();
    setMessage("");
  }

  // ====== เคลียร์ข้อมูลฟอร์ม ======
  function clearForm() {
    document.getElementById("edit-index").value = "";
    document.getElementById("product-name").value = "";
    document.getElementById("imageInput").value = "";
    document.getElementById("product-img-url").value = "";
    document.getElementById("preview").style.display = "none";
    document.getElementById("preview").src = "";
    document.getElementById("product-link").value = "";
  }

  // ====== แสดงข้อความสถานะ ======
  function setMessage(msg, color = "black") {
    const el = document.getElementById("message");
    el.innerText = msg;
    el.style.color = color;
  }
</script>
</body>
</html>
